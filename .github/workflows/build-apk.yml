name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  UV_PYTHON: "3.12"
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"
  CARE_APP_DISABLE_AI: "1"

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Build APK
        shell: bash
        run: |
          uv run flet build apk --yes --verbose --clear-cache \
            --exclude build dist __pycache__ care_records.db "*.txt" apk_build_log.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/apk
          if-no-files-found: error

